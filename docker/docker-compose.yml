services:
  # ============================================================================
  # LLM Inference Server (VLM support)
  # ============================================================================
  llama-server:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: cb-llama-server
    ports:
      - "8888:8888"
    volumes:
      - ${MODEL_DIR}:/models:ro
      - llama-data:/data
    environment:
      - MODEL=/models/${LLAMA_MODEL:-LFM2.5-VL-1.6B.Q8_0.gguf}
      - MMPROJ=/models/${LLAMA_MMPROJ:-LFM2.5-VL-1.6B.mmproj-f16.gguf}
    command: >
      --model /models/${LLAMA_MODEL:-LFM2.5-VL-1.6B.Q8_0.gguf}
      --mmproj /models/${LLAMA_MMPROJ:-LFM2.5-VL-1.6B.mmproj-f16.gguf}
      --host 0.0.0.0
      --port 8888
      --ctx-size 4096
      --threads ${CPU_THREADS:-4}
      --batch-size 512
      --ubatch-size 512
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================================================
  # VLM Processor - Image Analysis Service
  # ============================================================================
  vlm-processor:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vlm-processor
    container_name: cb-vlm-processor
    ports:
      - "${VLM_PORT:-8081}:8081"
    environment:
      - LLAMA_SERVER_URL=http://llama-server:8888
      - PORT=8081
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-camera_brain}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD required in .env file}
      - DB_NAME=${DB_NAME:-camera_brain}
    depends_on:
      llama-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # Query Engine - Natural Language Interface
  # ============================================================================
  query-engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile.query-engine
    container_name: cb-query-engine
    ports:
      - "${QUERY_PORT:-8082}:8082"
    environment:
      - LLAMA_SERVER_URL=http://llama-server:8888
      - PORT=8082
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-camera_brain}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD required in .env file}
      - DB_NAME=${DB_NAME:-camera_brain}
    depends_on:
      llama-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # Gateway - NATS Coordinator + HTTP API
  # ============================================================================
  gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gateway
    container_name: cb-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-camera_brain}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD required in .env file}
      - DB_NAME=${DB_NAME:-camera_brain}
      - NATS_URL=nats://nats:4222
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ${DATA_DIR:-./data}/storage:/var/lib/camera-brain/storage

  # ============================================================================
  # PostgreSQL + TimescaleDB + pgvector
  # ============================================================================
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: cb-postgres
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../storage/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    environment:
      - POSTGRES_USER=${DB_USER:-camera_brain}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD required in .env file}
      - POSTGRES_DB=${DB_NAME:-camera_brain}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-camera_brain}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================================
  # NATS - Message Bus
  # ============================================================================
  nats:
    image: nats:2.10-alpine
    container_name: cb-nats
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    command: ["-js"]
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4222 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============================================================================
  # Grafana - Visualization (Optional)
  # ============================================================================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: cb-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ../grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD required in .env file}
    depends_on:
      - postgres
    restart: unless-stopped

# ============================================================================
# Networks
# ============================================================================
networks:
  default:
    name: camera-brain
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres-data:
  nats-data:
  llama-data:
  grafana-data:
